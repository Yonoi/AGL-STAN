[data]
adj_filename = adj_mat.npy
node_features_filename = node_features.npy
train_ratio = 0.7
val_ratio = 0.1
num_nodes = 113
# for encoder 
window = 7
# for decoder 
horizon = 2
# std max11 max01 ns
norm = std
mask_value = 1e-5
default_graph = true

[model]
model_name = best_model.pth
# the number of crime type
input_dim = 8
output_dim = 8
rnn_units = 64
embed_dim = 10
top_k = 6
cheb_k = 2
num_layers = 2

# lapalcian random_walk dual_random_walk
filter_type = lapalcian
# tanh or relu
activation_func = tanh

[train]
epoch = 100
lr = 0.03
factor = 0.3
patience = 5
early_stop = 5
train_loss_filename = train_loss.npy
val_loss_filename = val_loss.npy
binary = false
batch_size = 8
teacher_forcing = true
cf_decay_steps = 1000
# regression task : mae, mse
# classification task : bce
loss_function = mae

[other]
device = cuda:0
data_path = ../data/la/
res_path = ../res/la/